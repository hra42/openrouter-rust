name: Release

# Trigger on any `v*` tag push (e.g. v0.1.0, v0.2.0, v1.0.0-rc.1).
# Verifies the working tree against the same gates as CI, then publishes
# to crates.io using Trusted Publishing (OIDC) — no long-lived token.
#
# One-time setup on crates.io (https://crates.io/crates/openrouter-client/settings):
#   - Add a Trusted Publisher with:
#       Repository owner:   hra42
#       Repository name:    openrouter-rust
#       Workflow filename:  release.yml
#       (Environment left blank — no environment gate.)
#
# To release: bump version + push the matching tag.
#   cargo set-version 0.2.0           # or edit Cargo.toml + CHANGELOG.md by hand
#   git commit -am "release: v0.2.0"
#   git tag v0.2.0
#   git push origin main v0.2.0

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "openrouter-client") | .version')
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $pkg_version"
            exit 1
          fi

  publish:
    needs: verify
    runs-on: ubuntu-latest
    # Required for Trusted Publishing — GitHub mints the OIDC token that
    # crates.io exchanges for a short-lived publish token.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Authenticate with crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Tolerate "crate version is already uploaded" so re-runs and
          # catch-up tags (e.g. tagging an already-published v0.1.0) don't
          # fail the release pipeline. Any other publish failure still
          # bubbles up.
          set +e
          out=$(cargo publish --all-features 2>&1)
          status=$?
          echo "$out"
          if [ $status -ne 0 ] && echo "$out" | grep -q "already uploaded"; then
            echo "::notice::Version already published on crates.io — skipping."
            exit 0
          fi
          exit $status

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Pick release notes
        id: notes
        run: |
          tag="${GITHUB_REF_NAME#v}"
          notes_file="RELEASE_NOTES_${tag}.md"
          if [ -f "$notes_file" ]; then
            echo "file=$notes_file" >> "$GITHUB_OUTPUT"
          else
            # Fall back to extracting the section from CHANGELOG.md.
            awk "/^## \[$tag\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md > _notes.md
            echo "file=_notes.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
